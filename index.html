<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Form</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f4f7fc;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,0.1);
    width:350px;
}

h2{
    text-align:center;
    margin-bottom:20px;
    color:#333;
}

input[type="date"]{
    width:100%;
    padding:10px;
    border:1px solid #ddd;
    border-radius:8px;
    margin-bottom:20px;
}

.checkbox-group{
    margin-bottom:20px;
}

.checkbox-group label{
    display:block;
    margin:10px 0;
    color:#555;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#4f46e5;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#3730a3;
}
</style>

</head>
<body>

<div class="container">
    <h2>Event Form</h2>

    <form action="https://formsubmit.co/abhinavskdv@gmail.com" method="POST">

        <input type="hidden" name="_captcha" value="false">

        <input type="date" name="Date" required>

        <div class="checkbox-group">
            <label>
                <input type="checkbox" name="Option A">
                Option A
            </label>

            <label>
                <input type="checkbox" name="Option B">
                Option B
            </label>
        </div>

        <button type="submit">Submit</button>

    </form>
</div>

</body>
</html>
