<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Can We Meet? </title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="hearts"></div>

<div class="card" id="page1">
    <h2>Namaskaram Suhrthe</h2>
    <h1>Can we meet one day?🙂</h1>
    <p class="subtext" id="message"></p>

    <div class="buttons">
        <button id="yesBtn">Yes 💖</button>
        <button id="noBtn">No 😤</button>
    </div>
</div>

<div class="card hidden" id="page2">
    <h1>YAY! 🎉</h1>
    <p>Just one promise... I won't argue. I just want to talk ❤️</p>

    <form action="https://formsubmit.co/abhinavskdv@gmail.com" method="POST">
        <input type="hidden" name="_captcha" value="false">
        <input type="hidden" name="_next" value="https://pls-open-me-miss.vercel.app/thankyou.html">

        <label>When would you be free?</label>
        <select id="dateSelect" name="Date" required></select>

        <label>Preferred time?</label>
        <select id="timeSelect" name="Time" required></select>

        <label>Anything you'd like me to know? (Optional)</label>
        <textarea name="Notes" rows="4"></textarea>

        <button type="submit">Let's do this ❤️</button>
    </form>
</div>

<script src="script.js"></script>
</body>
</html>
