<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Can We Meet? 🙂</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="hearts"></div>

    <!-- PAGE 1 -->

    <div class="card" id="page1">

        <h2>Namaskaram Suhrthe 💙</h2>

        <div class="terms-box">

            <h3>Terms & Conditions 📜</h3>

            <div class="term">
                ✓ Can we talk openly?
            </div>

            <div class="term">
                ✓ Can we sit/stand somewhere and talk?
            </div>

        </div>

        <h1>Can we meet one day? 🙂</h1>

        <p class="subtext" id="message"></p>

        <p id="counter"></p>

        <div class="buttons">

            <button id="yesBtn">
                Yes 💖
            </button>

            <button id="noBtn">
                No 😤
            </button>

        </div>

    </div>

    <!-- PAGE 2 -->

    <div class="card hidden" id="page2">

        <h1>Yayy 💙</h1>

        <p class="intro-text">
            I won't argue.
            <br>
            I just want to talk 🙂
        </p>

        <form action="https://formsubmit.co/abhinavskdv@gmail.com" method="POST">

            <input type="hidden" name="_captcha" value="false">

            <input
                type="hidden"
                name="_next"
                value="https://pls-open-me-miss.vercel.app/thankyou.html">

            <label>
                When will you be free?
            </label>

            <div id="dateCards" class="card-grid"></div>

            <input
                type="hidden"
                id="selectedDate"
                name="Date"
                required>

            <label>
                Time?
            </label>

            <div id="timeCards" class="card-grid"></div>

            <input
                type="hidden"
                id="selectedTime"
                name="Time"
                required>

            <label>
                Any notes? (Optional)
            </label>

            <textarea
                name="Notes"
                rows="4"
                placeholder="Anything you'd like to say..."></textarea>

            <button
                type="submit"
                class="submit-btn">
                Submit 💙
            </button>

        </form>

    </div>

    <script src="script.js"></script>

</body>

</html>
